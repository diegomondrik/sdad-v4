name: SDAD gates

# Server-side, authoritative re-run of the SDAD v5 gates on every pull request
# (SPEC v5.1 I1). The local hooks stay as fast pre-PR feedback; this workflow is
# the blocker on merge -- no developer, OS, or commit path can route around it.
# Least-privilege token and pull_request (not pull_request_target) per SPEC v5.1 §9.

on:
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  spec-gate:
    name: Spec gate (no code without an approved SPEC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply spec-gate policy to changed files
        env:
          BASE_REF: ${{ github.base_ref }}
        run: sh checks/spec-gate-ci.sh "$BASE_REF"

  ascii-ps1:
    name: ASCII ratchet (L-01)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked .ps1 for non-ASCII bytes
        run: sh checks/ascii-ps1.sh

  claude-md-case:
    name: CLAUDE.md case ratchet (L-04)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan code/config for wrong-case methodology-file references
        run: sh checks/claude-md-case.sh

  eval-core:
    name: SDAD eval (deterministic core)
    # INC-1 runs the eval on Windows (the scenarios invoke the Windows powershell
    # host). INC-2 ports the runner + scenarios to pwsh and expands to the
    # Windows / macOS / Linux matrix. See DECISIONS (v5.1 INC-1).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run the golden-dataset core
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .sdad/eval/run-eval.ps1
